<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
let RAW_DATA = [];

function normalizar(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "_")
    .trim();
}

function toNumber(valor) {
  if (!valor) return 0;
  return Number(
    valor
      .replace(/R\$\s?/g, '')
      .replace(/\./g, '')
      .replace(',', '.')
  ) || 0;
}

async function carregarDados() {

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFCQ6eYfaCBWKUp4kJ5x5W4r9Zcm8g1QY7YwhZZR9NglDsqieTEIAiIleRFLYFB8SwksAGnWIt5Pye/pub?output=csv&t=" + new Date().getTime();

  const res = await fetch(url);
  const csv = await res.text();

  Papa.parse(csv, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      RAW_DATA = results.data.map(row => {
        let obj = {};

        Object.keys(row).forEach(key => {
          obj[normalizar(key)] = row[key];
        });

        return {
          mes: obj.mes,
          loja: obj.loja,
          vendas_acessorios: toNumber(obj.vendas_acessorios),
          vendas_equipamentos: toNumber(obj.vendas_equipamentos),
          locacoes: toNumber(obj.locacoes),
          locacoes_cpap: toNumber(obj.locacoes_cpap),
          total: toNumber(obj.total),
          meta: obj.meta ? toNumber(obj.meta) : null
        };
      });

      console.log("DADOS CERTOS:", RAW_DATA);

      document.body.innerHTML =
        "<pre>" + JSON.stringify(RAW_DATA, null, 2) + "</pre>";
    }
  });
}

carregarDados();
</script>
