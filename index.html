<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Oxigenar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>
<h2>Dashboard (Teste de Dados)</h2>
<pre id="output">Carregando...</pre>

<script>
let RAW_DATA = [];

// 🔥 remove acento, espaço, etc
function normalizar(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "_")
    .trim();
}

// 🔥 converte número brasileiro
function toNumber(valor) {
  if (!valor) return 0;
  return Number(
    valor
      .replace(/\./g, '')
      .replace(',', '.')
  ) || 0;
}

async function carregarDados() {

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFCQ6eYfaCBWKUp4kJ5x5W4r9Zcm8g1QY7YwhZZR9NglDsqieTEIAiIleRFLYFB8SwksAGnWIt5Pye/pub?output=csv&t=" + new Date().getTime();

  const res = await fetch(url);
  const text = await res.text();

  // 🔥 suporta quebra de linha correta + separador brasileiro
  const linhas = text.split(/\r?\n/).map(l => l.split(";"));

  const headers = linhas[0];
  const rows = linhas.slice(1);

  RAW_DATA = rows.map(r => {
    let obj = {};

    headers.forEach((h, i) => {
      obj[normalizar(h)] = r[i];
    });

    return {
      mes: obj.mes,
      loja: obj.loja,
      vendas_acessorios: toNumber(obj.vendas_acessorios),
      vendas_equipamentos: toNumber(obj.vendas_equipamentos),
      locacoes: toNumber(obj.locacoes),
      locacoes_cpap: toNumber(obj.locacoes_cpap),
      total: toNumber(obj.total),
      meta: obj.meta ? toNumber(obj.meta) : null
    };
  });

  console.log("DADOS:", RAW_DATA);

  document.getElementById("output").textContent =
    JSON.stringify(RAW_DATA, null, 2);
}

carregarDados();
</script>

</body>
</html>
