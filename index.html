<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OXIGENAR — Dashboard de Resultados 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>

<script>
let RAW_DATA = [];

// 🔥 FUNÇÃO PRA CONVERTER NÚMERO BR
function toNumber(valor) {
  if (!valor) return 0;
  return Number(
    valor
      .replace(/\./g, '')   // remove milhar
      .replace(',', '.')    // decimal
  ) || 0;
}

// 🔥 CARREGAR DADOS DO GOOGLE SHEETS
async function carregarDados() {

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFCQ6eYfaCBWKUp4kJ5x5W4r9Zcm8g1QY7YwhZZR9NglDsqieTEIAiIleRFLYFB8SwksAGnWIt5Pye/pub?output=csv";

  const res = await fetch(url);
  const text = await res.text();

  // ⚠️ AQUI ESTAVA O ERRO (agora com ;)
  const linhas = text.split("\n").map(l => l.split(";"));

  const headers = linhas[0];
  const rows = linhas.slice(1);

  RAW_DATA = rows.map(r => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = r[i];
    });

    return {
      mes: obj.mes,
      loja: obj.loja,
      vendas_acessorios: toNumber(obj.vendas_acessorios),
      vendas_equipamentos: toNumber(obj.vendas_equipamentos),
      locacoes: toNumber(obj.locacoes),
      locacoes_cpap: toNumber(obj.locacoes_cpap),
      total: toNumber(obj.total),
      meta: obj.meta ? toNumber(obj.meta) : null
    };
  });

  console.log("DADOS CARREGADOS:", RAW_DATA);

  // TESTE SIMPLES
  document.body.innerHTML = "<pre>" + JSON.stringify(RAW_DATA, null, 2) + "</pre>";
}

carregarDados();
</script>

</body>
</html>
